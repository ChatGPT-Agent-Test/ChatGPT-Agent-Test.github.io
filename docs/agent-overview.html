<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>서비스 빌드 리포팅 에이전트 기능 설명서</title>
  <style>
    :root {
      --bg: #fff9f4;
      --panel: rgba(255, 255, 255, 0.94);
      --text: #2f2a26;
      --muted: #72675d;
      --line: #ecdccf;
      --accent: #c46d4b;
      --accent-soft: #fae7dc;
      --info-soft: #eef6ff;
      --info-text: #2c5d88;
      --shadow: 0 12px 34px rgba(97, 62, 39, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #fffaf5 0%, #fff4ec 100%);
      color: var(--text);
      line-height: 1.65;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .hero {
      padding: 28px;
      margin-bottom: 18px;
    }
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }
    h1, h2, h3 { margin: 0; }
    h1 {
      font-size: clamp(28px, 4vw, 38px);
      margin-bottom: 10px;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }
    .panel {
      padding: 22px;
    }
    .panel-title {
      font-size: 20px;
      margin-bottom: 14px;
    }
    .source-box,
    .notice {
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 14px;
    }
    .source-box {
      border: 1px dashed var(--line);
      background: #fffdfb;
      color: var(--muted);
    }
    .notice {
      border: 1px solid #d5e6f8;
      background: var(--info-soft);
      color: var(--info-text);
      display: none;
    }
    .notice.is-visible {
      display: block;
    }
    .toc {
      display: grid;
      gap: 12px;
    }
    .toc-item {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fffdfb;
    }
    .toc-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }
    .toc-item span {
      color: var(--muted);
      font-size: 14px;
    }
    .content {
      display: grid;
      gap: 14px;
    }
    .card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fffefa;
    }
    .card h3 {
      font-size: 18px;
      margin-bottom: 10px;
    }
    .card p,
    .card li {
      margin: 0;
      color: var(--text);
    }
    .card ul {
      margin: 10px 0 0 18px;
      padding: 0;
    }
    .muted {
      color: var(--muted);
    }
    .empty {
      color: var(--muted);
      font-style: italic;
    }
    .source-link {
      color: var(--accent);
      font-weight: 700;
    }
    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="badge-row">
        <span class="badge">Markdown 원본 기반</span>
        <span class="badge">간단 요약 UI</span>
      </div>
      <h1 id="page-title">서비스 빌드 리포팅 에이전트</h1>
      <p id="page-summary">`agent-overview.md` 문서를 읽어서 핵심 내용을 빠르게 볼 수 있도록 정리한 화면입니다.</p>
    </section>

    <section class="grid">
      <div class="panel">
        <h2 class="panel-title">문서 개요</h2>
        <div class="source-box" id="source-box">
          원본 문서: <strong>agent-overview.md</strong><br />
          HTTP 환경에서는 Markdown 원본을 바로 읽고, 로컬 파일로 열었을 때는 미리 준비된 요약으로 이어서 보여줍니다.<br />
          <a class="source-link" href="./agent-overview.md">Markdown 원문 열기</a>
        </div>
        <div class="notice" id="loading-note"></div>
        <div class="toc" id="toc"></div>
      </div>

      <div class="panel">
        <h2 class="panel-title">빠른 요약</h2>
        <div class="content" id="summary-cards"></div>
      </div>
    </section>
  </div>

  <script>
    const FALLBACK_SUMMARIES = [
      {
        title: "1. 에이전트명",
        preview: "서비스 빌드 리포팅 에이전트",
        bullets: ["서비스 빌드 리포팅 에이전트"]
      },
      {
        title: "2. 에이전트 목적",
        preview: "프로젝트 수정과 함께 계획, 테스트, 결과, 차이 분석까지 묶어서 GitHub 반영 대상으로 관리합니다.",
        bullets: [
          "프로젝트 수정 작업을 표준 프로세스로 수행합니다.",
          "작업 계획서, 테스트 시나리오, 테스트 결과, 변경 비교 보고서를 함께 정리합니다.",
          "형상관리와 추적이 가능하도록 기록을 남깁니다."
        ]
      },
      {
        title: "3. 에이전트 기능",
        preview: "프로젝트 수정 표준화, 보고서 작성 자동화, 테스트 결과 분리, 보고서 허브 기준, GitHub 반영 흐름을 다룹니다.",
        bullets: [
          "프로젝트 수정 요청의 목표, 범위, 영향도를 먼저 파악합니다.",
          "4개 카테고리 보고서를 기준으로 작업을 관리합니다.",
          "성공과 실패 테스트 결과를 분리해 기록합니다.",
          "보고서 허브 UI와 dev 브랜치 반영 기준을 함께 관리합니다."
        ]
      },
      {
        title: "4. 에이전트 제약 조건",
        preview: "저장소 기본값, 브랜치 규칙, 보고서 작성 의무, HTML 구조 제한, 검증 없는 완료 금지 같은 운영 규칙이 정리돼 있습니다.",
        bullets: [
          "기본 저장소는 ChatGPT-Agent-Test/ChatGPT-Agent-Test.github.io 입니다.",
          "웹 화면 개편 작업도 dev 브랜치를 기준으로 합니다.",
          "파일 수정이 있으면 보고서를 생략하지 않습니다.",
          "개별 HTML 파일과 링크 구조를 유지합니다."
        ]
      },
      {
        title: "5. 요약",
        preview: "이 에이전트는 코드 변경만이 아니라 계획, 검증, 결과, 비교 분석까지 연결해서 수행하도록 설계돼 있습니다.",
        bullets: [
          "GitHub 기반 리포팅 에이전트입니다.",
          "실제 작업, 검증, 기록이 연결된 흐름을 지향합니다."
        ]
      }
    ];

    async function loadMarkdown() {
      if (window.location.protocol === "file:") {
        return {
          mode: "fallback",
          sections: FALLBACK_SUMMARIES,
          message: "로컬 파일 환경에서는 브라우저가 Markdown fetch를 막을 수 있어 미리 준비된 요약으로 보여주고 있습니다. 원문은 같은 폴더의 agent-overview.md에서 바로 확인할 수 있습니다."
        };
      }

      try {
        const response = await fetch("./agent-overview.md");
        if (!response.ok) {
          throw new Error("Markdown file could not be loaded.");
        }

        return {
          mode: "live",
          sections: parseSections(await response.text()).map(summarizeSection),
          message: "현재 화면은 Markdown 원본을 직접 읽어 최신 요약을 보여주고 있습니다."
        };
      } catch (error) {
        return {
          mode: "fallback",
          sections: FALLBACK_SUMMARIES,
          message: "Markdown 원본을 직접 읽지 못해 미리 준비된 요약으로 전환했습니다. 정적 서버나 GitHub Pages 환경에서는 원본 기반 로딩이 다시 동작합니다."
        };
      }
    }

    function parseSections(markdown) {
      const lines = markdown.split("\n");
      const sections = [];
      let current = null;

      for (const line of lines) {
        const h2 = line.match(/^##\s+(.*)$/);
        if (h2) {
          if (current) {
            sections.push(current);
          }
          current = { title: h2[1].trim(), lines: [] };
          continue;
        }
        if (current) {
          current.lines.push(line);
        }
      }

      if (current) {
        sections.push(current);
      }

      return sections;
    }

    function summarizeSection(section) {
      const cleaned = section.lines
        .map((line) => line.trim())
        .filter(Boolean)
        .filter((line) => !line.startsWith("###"));

      const bullets = cleaned
        .filter((line) => line.startsWith("- "))
        .map((line) => line.replace(/^-\s*/, ""));

      const paragraphs = cleaned
        .filter((line) => !line.startsWith("- "))
        .map((line) => line.replace(/`/g, ""));

      return {
        title: section.title,
        preview: paragraphs[0] || bullets[0] || "요약할 내용이 없습니다.",
        bullets: bullets.slice(0, 4)
      };
    }

    function render(sections, message, mode) {
      const toc = document.getElementById("toc");
      const cards = document.getElementById("summary-cards");
      const note = document.getElementById("loading-note");
      const sourceBox = document.getElementById("source-box");

      toc.innerHTML = "";
      cards.innerHTML = "";

      note.textContent = message;
      note.classList.add("is-visible");

      if (mode === "fallback") {
        sourceBox.innerHTML = `
          원본 문서: <strong>agent-overview.md</strong><br />
          현재는 로컬 파일 또는 fetch 제한 환경에서도 끊기지 않도록 준비된 요약을 보여주고 있습니다.<br />
          <a class="source-link" href="./agent-overview.md">Markdown 원문 열기</a>
        `;
      }

      sections.forEach((summary, index) => {
        const tocItem = document.createElement("div");
        tocItem.className = "toc-item";
        tocItem.innerHTML = `<strong>${index + 1}. ${summary.title}</strong><span>${summary.preview}</span>`;
        toc.appendChild(tocItem);

        const card = document.createElement("article");
        card.className = "card";
        const list = summary.bullets.length
          ? `<ul>${summary.bullets.map((item) => `<li>${item}</li>`).join("")}</ul>`
          : `<p class="empty">핵심 항목이 없으면 원본 Markdown 문서를 확인하세요.</p>`;

        card.innerHTML = `
          <h3>${summary.title}</h3>
          <p class="muted">${summary.preview}</p>
          ${list}
        `;
        cards.appendChild(card);
      });
    }

    loadMarkdown().then(({ sections, message, mode }) => {
      render(sections, message, mode);
    });
  </script>
</body>
</html>
